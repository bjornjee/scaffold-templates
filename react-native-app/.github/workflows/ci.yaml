name: React Native CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: react-native-app
        run: npm install

      - name: Lint
        working-directory: react-native-app
        run: make lint

      - name: Type check
        working-directory: react-native-app
        run: make typecheck

      - name: Test
        working-directory: react-native-app
        run: make test
