name: Python CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:python3.13-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint
        run: make lint
      - name: Type check
        run: make typecheck
      - name: Test
        run: make test
